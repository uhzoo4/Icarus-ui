$WORKFLOW_ICON=
$WORKFLOW_DESCRIPTION = macOS Premium Aesthetics

# Bind SUPER+A to the fullscreen macOS Launchpad app grid
bind = SUPER, A, exec, rofi -show drun -theme ~/.config/rofi/launchpad.rasi

# Set gaps to match macOS window spacing better
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(ffffff44)
    col.inactive_border = rgba(ffffff11)
}

decoration {
    rounding = 12
    drop_shadow = yes
    shadow_range = 30
    shadow_render_power = 3
    col.shadow = rgba(00000044)
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = on
    }
}
