$WORKFLOW_ICON=
$WORKFLOW_DESCRIPTION = macOS Premium Aesthetics

# Bind SUPER+A to the fullscreen macOS Launchpad app grid
bind = SUPER, A, exec, rofi -show drun -theme ~/.config/rofi/launchpad.rasi

# Bind SUPER+D to toggle the macOS Control Center (Eww Dashboard)
bind = SUPER, D, exec, eww open --toggle dashboard

# Set gaps to match macOS window spacing better, with metallic animated border gradients
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(9aa0a6ff) rgba(4A6D8Cff) rgba(ffffffdd) 45deg
    col.inactive_border = rgba(26282bcc)
}

decoration {
    rounding = 12
    drop_shadow = yes
    shadow_range = 30
    shadow_render_power = 3
    col.shadow = rgba(00000044)
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = on
    }
}
