# ~/.config/hypr/animations/mac-fluid.conf
# Fluid macOS-style Bezier curves and physics for Icarus-OS

animations {
    enabled = yes

    # Fluid physics mimicking macOS Genie / Spring physics
    bezier = macosFluid, 0.05, 0.9, 0.1, 1.05
    bezier = macosOut, 0.1, 1.0, 0.3, 1.0
    bezier = macosLinear, 0.0, 0.0, 1.0, 1.0
    
    # Very fluid window movement and resizing
    animation = windows, 1, 6, macosFluid, slide
    animation = windowsOut, 1, 5, macosOut, slide
    animation = windowsMove, 1, 6, macosFluid, slide
    animation = windowsIn, 1, 6, macosFluid, slide

    # Smooth borders and fading
    animation = border, 1, 10, default
    animation = borderangle, 1, 50, macosLinear, loop
    animation = fade, 1, 5, macosOut
    
    # Workspace sliding similar to macOS Spaces
    animation = workspaces, 1, 6, macosFluid, slide
    animation = specialWorkspace, 1, 6, macosFluid, slidevert
}
