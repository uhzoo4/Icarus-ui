<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <!-- Ground -->
  <g id="ground">
    <line x1="0" y1="180" x2="1200" y2="180" stroke="black" stroke-width="2"/>
    <line x1="10" y1="185" x2="20" y2="185" stroke="black" stroke-width="2"/>
    <line x1="150" y1="183" x2="160" y2="183" stroke="black" stroke-width="2"/>
  </g>

  <!-- Dino Stand -->
  <g id="dino_stand" transform="scale(2)">
    <path d="M 22 2 L 22 3 L 23 3 L 23 4 L 23 10 L 22 10 L 22 11 L 21 11 L 21 12 L 20 12 L 20 13 L 19 13 L 19 14 L 18 14 L 18 15 L 17 15 L 17 16 L 16 16 L 16 17 L 15 17 L 15 18 L 14 18 L 14 19 L 13 19 L 13 20 L 12 20 L 12 21 L 11 21 L 11 12 L 12 12 L 12 11 L 13 11 L 13 10 L 14 10 L 14 9 L 15 9 L 15 8 L 16 8 L 16 7 L 17 7 L 17 6 L 18 6 L 18 5 L 19 5 L 19 4 L 20 4 L 20 3 L 21 3 L 21 2 Z" fill="black"/>
    <!-- Boxy dino -->
    <rect x="20" y="2" width="12" height="12" fill="black"/>
    <rect x="22" y="4" width="2" height="2" fill="white"/> <!-- Eye -->
    <rect x="26" y="8" width="6" height="2" fill="black"/> <!-- Snout -->
    <rect x="18" y="10" width="8" height="10" fill="black"/> <!-- Body -->
    <rect x="14" y="14" width="4" height="4" fill="black"/> <!-- Tail base -->
    <rect x="12" y="12" width="2" height="2" fill="black"/> <!-- Tail tip -->
    <rect x="26" y="14" width="4" height="2" fill="black"/> <!-- Arm -->
    <rect x="20" y="20" width="2" height="4" fill="black"/> <!-- Leg 1 -->
    <rect x="24" y="20" width="2" height="4" fill="black"/> <!-- Leg 2 -->
  </g>
  
  <!-- Dino Run 1 -->
  <g id="dino_run1" transform="scale(2)">
    <rect x="20" y="2" width="12" height="12" fill="black"/>
    <rect x="22" y="4" width="2" height="2" fill="white"/>
    <rect x="26" y="8" width="6" height="2" fill="black"/>
    <rect x="18" y="10" width="8" height="10" fill="black"/>
    <rect x="14" y="14" width="4" height="4" fill="black"/>
    <rect x="12" y="12" width="2" height="2" fill="black"/>
    <rect x="26" y="14" width="4" height="2" fill="black"/>
    <rect x="20" y="20" width="2" height="2" fill="black"/> <!-- Leg 1 up -->
    <rect x="24" y="20" width="2" height="4" fill="black"/> <!-- Leg 2 down -->
  </g>

  <!-- Dino Run 2 -->
  <g id="dino_run2" transform="scale(2)">
    <rect x="20" y="2" width="12" height="12" fill="black"/>
    <rect x="22" y="4" width="2" height="2" fill="white"/>
    <rect x="26" y="8" width="6" height="2" fill="black"/>
    <rect x="18" y="10" width="8" height="10" fill="black"/>
    <rect x="14" y="14" width="4" height="4" fill="black"/>
    <rect x="12" y="12" width="2" height="2" fill="black"/>
    <rect x="26" y="14" width="4" height="2" fill="black"/>
    <rect x="20" y="20" width="2" height="4" fill="black"/> <!-- Leg 1 down -->
    <rect x="24" y="20" width="2" height="2" fill="black"/> <!-- Leg 2 up -->
  </g>
  
  <!-- Cactus -->
  <g id="cactus" transform="scale(2)">
    <rect x="10" y="10" width="4" height="14" fill="black"/> <!-- Main stem -->
    <rect x="6" y="14" width="4" height="2" fill="black"/> <!-- Left arm horizontal -->
    <rect x="6" y="12" width="2" height="4" fill="black"/> <!-- Left arm vertical -->
    <rect x="14" y="16" width="4" height="2" fill="black"/> <!-- Right arm horizontal -->
    <rect x="16" y="12" width="2" height="6" fill="black"/> <!-- Right arm vertical -->
  </g>
</svg>